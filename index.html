<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#4A6FA5" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="가계부" />
<title>가계부</title>
<style>
  :root {
    --primary: #4A6FA5; --income: #2E7D32; --expense: #C62828;
    --bg: #f5f6f8; --surface: #ffffff; --surface-2: #eef0f4;
    --text: #1c1e22; --text-dim: #6b7280; --border: #e3e6ec; --savings: #5C6BC0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  }
  [data-theme="dark"] {
    --primary: #8ab0e8; --income: #81c995; --expense: #f28b82;
    --bg: #121316; --surface: #1d1f24; --surface-2: #26282e;
    --text: #e8eaed; --text-dim: #9aa0a6; --border: #34363c; --savings: #9fa8da;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: "Noto Sans KR", -apple-system, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto;
    min-height: 100vh; padding-bottom: 76px; transition: background .2s, color .2s; }
  header { padding: 8px 12px 0; }
  .month-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 6px; }
  .month-nav button { border: none; background: var(--surface-2); color: var(--text);
    width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
  .month-nav .label { font-size: 15px; font-weight: 600; min-width: 110px; text-align: center; }
  main { padding: 6px 12px; }
  .topbar { display: flex; align-items: center; height: 40px; margin-bottom: 10px; }
  .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); padding: 11px; margin-bottom: 8px; }
  .section-title { font-size: 15px; font-weight: 700; margin: 2px 2px 5px; }
  .summary-row { display: flex; justify-content: space-around; align-items: center; }
  .summary-item { text-align: center; }
  .summary-item .lbl { font-size: 12px; color: var(--text-dim); }
  .summary-item .val { font-size: 14px; font-weight: 700; margin-top: 4px; }
  .summary-item .lbl { white-space: nowrap; }
  .divider-v { width: 1px; height: 38px; background: var(--border); }
  .balance-row { display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); margin-top: 7px; padding-top: 7px; }
  .balance-row .lbl { font-weight: 600; }
  .balance-row .val { font-size: 20px; font-weight: 800; }
  /* 달력 */
  .cal-head { display: grid; grid-template-columns: repeat(7,1fr); text-align: center;
    font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
  .cal-head .sun { color: var(--expense); }
  .cal-head .sat { color: var(--primary); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-day { min-height: 42px; border: none; background: none; border-radius: 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; padding: 3px 1px; gap: 0; color: var(--text); overflow: hidden; }
  .cal-day.other { visibility: hidden; }
  .cal-day .d { font-size: 12px; line-height: 1.2; }
  .cal-day.today { background: var(--surface-2); }
  .cal-day.today .d { font-weight: 800; color: var(--primary); }
  .cal-day.sel { background: var(--primary); }
  .cal-day.sel .d { color: #fff; font-weight: 700; }
  .cal-amt { font-size: 8px; line-height: 1.1; font-weight: 700; min-height: 9px; white-space: nowrap; }
  .cal-amt.inc { color: var(--income); }
  .cal-amt.exp { color: var(--expense); }
  .cal-amt.sav { color: var(--savings); }
  .cal-day.sel .cal-amt { color: #fff; }
  .cal-day.future .cal-amt { opacity: .4; }
  /* 거래 줄 */
  .tx { display: flex; align-items: center; gap: 12px; padding: 9px 4px; border-bottom: 1px solid var(--border); }
  .tx:last-child { border-bottom: none; }
  .tx .icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0; }
  .tx .body { flex: 1; min-width: 0; cursor: pointer; }
  .tx .name { font-weight: 600; font-size: 15px; }
  .tx .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .tx .amt { font-weight: 700; font-size: 15px; white-space: nowrap; }
  .tx .del { border: none; background: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px 6px; }
  .empty { text-align: center; color: var(--text-dim); padding: 40px 0; line-height: 1.6; }
  .chips { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .donut-wrap { display: flex; flex-direction: column; align-items: center; }
  .legend { width: 100%; margin-top: 6px; }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-row .lname { flex: 1; }
  .legend-row .lpct { color: var(--text-dim); font-size: 12px; }
  .legend-row .lamt { font-weight: 600; }
  .bars { display: flex; align-items: flex-end; justify-content: space-around; gap: 4px; padding-top: 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar-pair { display: flex; align-items: flex-end; gap: 3px; height: 90px; }
  .bar { border-radius: 3px 3px 0 0; transition: height .3s; min-height: 2px; }
  .bar-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .bar-legend { display: flex; justify-content: center; gap: 18px; font-size: 12px; margin-bottom: 6px; }
  .period-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 12px; }
  .period-nav button { border: none; background: var(--surface-2); color: var(--text);
    width: 30px; height: 30px; border-radius: 50%; font-size: 17px; cursor: pointer; }
  .period-nav .label { font-size: 15px; font-weight: 600; min-width: 110px; text-align: center; }
  /* 자산 */
  .asset-total { text-align: center; }
  .asset-total .lbl { font-size: 13px; color: var(--text-dim); }
  .asset-total .val { font-size: 30px; font-weight: 800; margin-top: 6px; }
  .asset-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .asset-row:last-child { border-bottom: none; }
  .asset-row .icon { font-size: 22px; width: 30px; text-align: center; }
  .asset-row .name { flex: 1; font-weight: 600; }
  .asset-row .amt { font-weight: 700; }
  .asset-row .chev { color: var(--text-dim); }
  .ledger-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-row .ld { font-size: 12px; color: var(--text-dim); width: 44px; flex-shrink: 0; }
  .ledger-row .ll { flex: 1; font-size: 14px; min-width: 0; }
  .ledger-row .lv { font-weight: 700; font-size: 14px; white-space: nowrap; }
  .ledger-row .lb { font-size: 11px; color: var(--text-dim); white-space: nowrap; margin-left: 6px; }
  /* 설정 */
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 4px; border-bottom: 1px solid var(--border); }
  .setting-row .s-label { font-size: 15px; }
  .setting-row .s-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .seg button { border: none; background: var(--surface); color: var(--text); padding: 8px 14px; font-size: 13px; cursor: pointer; }
  .seg button.active { background: var(--primary); color: #fff; }
  .link-btn { background: none; border: none; color: var(--primary); font-size: 14px; cursor: pointer; padding: 0; }
  .danger { color: var(--expense) !important; }
  .cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .cat-row .name { flex: 1; }
  .fab { position: fixed; bottom: 66px; right: 16px; background: var(--primary); color: #fff;
    border: none; border-radius: 50%; width: 54px; height: 54px; padding: 0; font-size: 28px; line-height: 1; cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,0,0,.25); z-index: 20; display: flex; align-items: center; justify-content: center; }
  .icon-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 19px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .add-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--primary); color: #fff;
    font-size: 24px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .view-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; min-height: 38px; }
  nav.tabs { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 15; }
  nav.tabs button { flex: 1; border: none; background: none; color: var(--text-dim); padding: 8px 0 10px; font-size: 11px;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  nav.tabs button .ic { font-size: 21px; }
  nav.tabs button.active { color: var(--primary); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: none; align-items: center; justify-content: center; padding: 16px; }
  .overlay.open { display: flex; }
  .sheet { background: var(--surface); width: 100%; max-width: 440px; border-radius: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; }
  .list-opt { display: block; width: 100%; text-align: left; padding: 13px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; margin-bottom: 8px; }
  .list-opt.sel { background: var(--primary); color: #fff; border-color: var(--primary); }
  .sheet h2 { margin: 0 0 16px; font-size: 18px; }
  .field { margin-bottom: 16px; }
  .field > label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text); font-size: 15px; }
  .type-toggle { display: flex; gap: 8px; }
  .type-toggle button { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; }
  .type-toggle button.act-exp { background: var(--expense); color: #fff; border-color: var(--expense); }
  .type-toggle button.act-inc { background: var(--income); color: #fff; border-color: var(--income); }
  .type-toggle button.on { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cat-pick { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 12px 4px; }
  .cat-item { border: none; background: none; cursor: pointer; padding: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .cat-circle { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .cat-name { font-size: 11px; color: var(--text); text-align: center; line-height: 1.15; word-break: keep-all; }
  .cat-item.sel .cat-circle { box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--primary); }
  .cat-item.sel .cat-name { font-weight: 700; color: var(--primary); }
  .emoji-pick, .color-pick { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-pick .e { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface-2);
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .emoji-pick .e.sel { outline: 3px solid var(--primary); }
  .color-pick .c { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-pick .c.sel { border-color: var(--text); }
  .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: #fff;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .btn-ghost { width: 100%; padding: 12px; border: none; background: none; color: var(--text-dim); font-size: 14px; cursor: pointer; margin-top: 6px; }
  .hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
  .del-opt { display: block; width: 100%; text-align: left; padding: 14px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; margin-bottom: 8px; }
  .check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
  .check-row input { width: auto !important; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sheet-head h2 { margin: 0; }
  .sheet-x { border: none; background: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 2px 6px; line-height: 1; }
  .sub-label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .opt3 { display: flex; gap: 8px; margin-bottom: 12px; }
  .opt3-btn { flex: 1; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text);
    padding: 9px 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; min-height: 56px; justify-content: center; }
  .opt3-btn.opt3-static { cursor: default; }
  .opt3-btn.active { border-color: var(--primary); background: var(--surface-2); }
  .opt3-label { font-size: 12px; color: var(--text-dim); }
  .opt3-val { font-size: 13px; font-weight: 600; text-align: center; }
  .opt-panel { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; background: var(--surface-2); }
  .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; transition: .2s; cursor: pointer; }
  .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: var(--primary); }
  .switch input:checked + .slider:before { transform: translateX(18px); }
  /* 입력칸 지우기 X */
  .input-wrap { position: relative; }
  .input-wrap > input { padding-right: 34px; }
  .clear-x { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); border: none; background: var(--surface-2);
    color: var(--text-dim); width: 22px; height: 22px; border-radius: 50%; font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center; line-height: 1; padding: 0; }
  .input-wrap > input:not(:placeholder-shown) ~ .clear-x { display: flex; }
  /* 휠 날짜 선택 */
  .wheel-wrap { position: relative; display: flex; gap: 12px; }
  .wheel { flex: 1; height: 180px; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; padding: 70px 0; scrollbar-width: none; }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel-item { height: 40px; line-height: 40px; scroll-snap-align: center; font-size: 18px; color: var(--text-dim); }
  .wheel-item.on { color: var(--text); font-weight: 700; font-size: 21px; }
  .wheel-center { position: absolute; left: 0; right: 0; top: 70px; height: 40px; border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); pointer-events: none; }
  /* 홈 검색 아이콘 */
  #home-search { font-size: 17px; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <main id="view"></main>
  <button class="fab" id="fab">＋</button>
  <nav class="tabs">
    <button data-tab="home" class="active"><span class="ic">🏠</span>홈</button>
    <button data-tab="stats"><span class="ic">📊</span>통계</button>
    <button data-tab="assets"><span class="ic">💰</span>자산</button>
    <button data-tab="settings"><span class="ic">⚙️</span>설정</button>
  </nav>

  <!-- 거래 입력/수정 -->
  <div class="overlay" id="tx-modal"><div class="sheet">
    <div class="sheet-head">
      <h2 id="tx-modal-title">거래 입력</h2>
      <button id="f-close" class="sheet-x">✕</button>
    </div>
    <div class="field"><div class="type-toggle"><button id="t-expense">지출</button><button id="t-income">수입</button></div></div>
    <div class="field"><label>금액</label><input type="number" id="f-amount" inputmode="numeric" placeholder="0" /></div>
    <div class="field"><label>메모 (선택)</label><input class="clearable" type="text" id="f-memo" placeholder="예: 점심" /></div>
    <div class="field"><label>카테고리 <span style="font-size:12px;color:var(--text-dim)" id="cat-hint"></span></label><div class="cat-pick" id="f-cats"></div></div>
    <div id="target-info" style="display:none;margin-bottom:12px">
      <button class="opt3-btn" id="open-target" style="width:100%;flex-direction:row;justify-content:space-between;padding:12px 14px;min-height:0">
        <span class="opt3-label">이체 대상</span><span class="opt3-val" id="target-name">선택하기 ›</span></button>
    </div>
    <div class="field" id="date-field" style="display:none"><label>날짜</label><input type="date" id="f-date" /></div>

    <!-- 결제수단 / 반복 / 제외 -->
    <div class="opt3">
      <button class="opt3-btn" id="btn-method"><span class="opt3-label">결제수단</span><span class="opt3-val" id="method-val">현금</span></button>
      <button class="opt3-btn" id="btn-repeat"><span class="opt3-label">반복</span><span class="opt3-val" id="repeat-val">안 함</span></button>
      <div class="opt3-btn opt3-static"><span class="opt3-label">제외</span>
        <label class="switch"><input type="checkbox" id="f-exclude" /><span class="slider"></span></label></div>
    </div>

    <button class="btn-primary" id="f-save" style="display:none">수정 완료</button>
  </div></div>

  <!-- 결제수단 팝업 -->
  <div class="overlay" id="method-modal"><div class="sheet">
    <div class="sheet-head"><h2>결제수단</h2><button id="mm-close" class="sheet-x">✕</button></div>
    <div class="type-toggle"><button id="m-cash">현금</button><button id="m-card">💳 카드</button></div>
    <div id="install-wrap" style="margin-top:14px;display:none">
      <label class="sub-label">할부</label>
      <select id="f-install">
        <option value="1">일시불</option><option value="2">2개월</option><option value="3">3개월</option>
        <option value="4">4개월</option><option value="6">6개월</option><option value="12">12개월</option><option value="24">24개월</option>
      </select>
      <div class="hint" id="install-hint"></div>
    </div>
    <button class="btn-primary" id="mm-done" style="margin-top:16px">확인</button>
  </div></div>

  <!-- 반복 팝업 -->
  <div class="overlay" id="repeat-modal"><div class="sheet">
    <div class="sheet-head"><h2>반복</h2><button id="rm-close" class="sheet-x">✕</button></div>
    <div id="repeat-list"></div>
    <label class="check-row" id="unlimited-row" style="display:none;margin:6px 0 0"><input type="checkbox" id="f-unlimited" checked /> 무제한 (계속 반복)</label>
    <div id="count-wrap" style="display:none;margin-top:10px"><label class="sub-label" id="count-label">반복 횟수</label><input type="number" id="f-count" value="12" min="1" /></div>
    <button class="btn-primary" id="rm-done" style="margin-top:16px">확인</button>
  </div></div>

  <!-- 이체 대상 팝업 -->
  <div class="overlay" id="target-modal"><div class="sheet">
    <div class="sheet-head"><h2>이체 대상 자산</h2><button id="tm-close" class="sheet-x">✕</button></div>
    <div class="hint" style="margin-bottom:12px">현금에서 빠져 선택한 자산으로 이동합니다.</div>
    <div class="cat-pick" id="f-targets"></div>
  </div></div>

  <!-- 반복 삭제 선택 -->
  <div class="overlay" id="del-modal"><div class="sheet">

const loadLS = (k, def) => { try { const v = JSON.parse(localStorage.getItem(k)); return v ?? def; } catch { return def; } };
const saveLS = (k, v) => { localStorage.setItem(k, JSON.stringify(v)); if (DATA_KEYS.has(k)) schedulePush(); };
const pad = (n) => String(n).padStart(2,"0");
const ymd = (dt) => dt.getFullYear() + "-" + pad(dt.getMonth()+1) + "-" + pad(dt.getDate());
const parseYMD = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const lastDay = (y, m) => new Date(y, m+1, 0).getDate();

let txs = loadLS(LS.txs, null);

if (!assets) { assets = DEFAULT_ASSETS.map(a => ({ id: uid("a_"), base: 0, ...a })); saveLS(LS.assets, assets); }
if (!txs) {
  txs = [];
  if (!localStorage.getItem(LS.seeded)) {
    const catId = (n) => cats.find(c => c.name === n).id;
    const now = new Date();

    const add = (mAgo, day, type, cat, amount, memo) => txs.push({ id: uid("t_"), amount, type, categoryId: catId(cat), memo, date: d(mAgo, day), method:"cash" });
    add(0,5,"income","월급",3200000,"월급"); add(0,10,"income","용돈",100000,"생일 용돈");
    add(0,2,"expense","주거",500000,"월세"); add(0,3,"expense","식비",12000,"점심");
    add(0,4,"expense","교통비",1250,"버스"); add(0,6,"expense","식비",38000,"저녁 외식");
    add(0,8,"expense","생필품",64000,"티셔츠"); add(0,12,"expense","문화생활",15000,"영화");
    add(0,15,"expense","의료/건강",8000,"약국"); add(0,18,"expense","식비",9500,"카페");
    [1,2,3].forEach(m => {
      add(m,5,"income","월급",3200000,"월급"); add(m,3,"expense","주거",500000,"월세");
      add(m,7,"expense","식비",220000 + m*15000,"한 달 식비"); add(m,12,"expense","생필품",Math.max(20000, 90000 - m*10000),"쇼핑");
      add(m,16,"expense","문화생활",60000,"취미"); add(m,20,"expense","교통비",55000,"교통비");
    });

  }
  saveLS(LS.txs, txs);
}

// ---- 마이그레이션 (기존 데이터 보정) ----
let aChg = false;
assets.forEach(a => { if (a.base === undefined) { a.base = a.amount || 0; aChg = true; } if ("amount" in a) { delete a.amount; aChg = true; } });
if (!assets.some(a => a.cash)) { const c = assets.find(a => a.name === "현금"); if (c) c.cash = true; else assets.unshift({ id: uid("a_"), name:"현금", emoji:"💵", base:0, cash:true }); aChg = true; }

// 기본 카테고리 아이콘/색상/항목을 최신 세트로 동기화 (1회).

if (loadLS(LS.catver, 0) !== CAT_VERSION) {
  let cChg = false;

    const ex = cats.find(c => c.name === def.name && c.type === def.type);

      }

  saveLS(LS.catver, CAT_VERSION);
}
if (loadLS(LS.assetver, 0) !== ASSET_VERSION) {
  // 적금 아이콘이 저축과 겹쳐서 변경 (사용자가 안 바꾼 경우에만)

// ---------- 상태 ----------

const CUR_MONTH = todayStr.slice(0,7);
// 다음 달 이후로 예약된(미래 달) 거래 → 그 달이 와야 합계·자산에 반영됨

};

// ---------- 헬퍼 ----------
const won = (n) => "₩" + Math.round(n).toLocaleString("ko-KR");
const monthKey = (dt) => dt.getFullYear() + "-" + pad(dt.getMonth()+1);
const monthLabel = (dt) => dt.getFullYear() + "년 " + (dt.getMonth()+1) + "월";
const catById = (id) => cats.find(c => c.id === id);
const assetById = (id) => assets.find(a => a.id === id);
const assetName = (id) => (assetById(id)?.name) || "자산";
const txsOfMonth = (dt) => txs.filter(t => t.date.startsWith(monthKey(dt))).sort((a,b) => b.date.localeCompare(a.date));
const txsOfYear = (y) => txs.filter(t => t.date.startsWith(y + "-")).sort((a,b) => b.date.localeCompare(a.date));
// 이체(저축)는 지출 합계에서 제외

const sumByType = (list, type) => list.filter(t => t.type === type && !t.transfer && !t.exclude && !isPlanned(t)).reduce((s,t) => s + t.amount, 0);
const savingsOf = (list) => list.filter(t => t.transfer && !t.exclude && !isPlanned(t)).reduce((s,t) => s + t.amount, 0);
function aggregate(list) {
  const m = {};
  list.forEach(t => { m[t.categoryId] = (m[t.categoryId]||0) + t.amount; });
  return Object.entries(m).map(([id, total]) => ({ cat: catById(id), total })).sort((a,b) => b.total - a.total);
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function assetBalance(a) {
  let bal = 0;
  txs.forEach(t => {
    if (isPlanned(t)) return;
    if (t.assetEntry) { if (t.assetId === a.id) bal += (t.dir || 1) * t.amount; return; }
    if (t.transfer) { if (t.targetAssetId === a.id) bal += t.amount; if (a.cash) bal -= t.amount; return; }
    if (a.cash) { if (t.type === "income") bal += t.amount; else if (t.type === "expense") bal -= t.amount; }
  });
  return bal;
}
function addDays(dt, n) { const d = new Date(dt); d.setDate(d.getDate() + n); return d; }
function genDates(startStr, freq, count) {
  const start = parseYMD(startStr); const baseDay = start.getDate(); const out = [];
  count = Math.max(1, Math.min(count, 366));
  if (freq === "daily") { for (let i=0; i<count; i++) out.push(ymd(addDays(start, i))); }
  else if (freq === "weekdays") {
    let dt = new Date(start), made = 0;
    while (made < count) { const w = dt.getDay(); if (w !== 0 && w !== 6) { out.push(ymd(dt)); made++; } dt = addDays(dt, 1); }
  }
  else if (freq === "weekly" || freq === "biweekly" || freq === "every4weeks") {
    const step = freq === "weekly" ? 7 : freq === "biweekly" ? 14 : 28;
    for (let i=0; i<count; i++) out.push(ymd(addDays(start, i*step)));
  }
  else { // monthly, monthlyLast, yearly
    const step = freq === "yearly" ? 12 : 1;
    const baseAbs = start.getFullYear()*12 + start.getMonth();
    for (let i=0; i<count; i++) { const abs = baseAbs + i*step; const yy = Math.floor(abs/12), mm = abs%12;
      const day = freq === "monthlyLast" ? lastDay(yy, mm) : Math.min(baseDay, lastDay(yy, mm)); out.push(ymd(new Date(yy, mm, day))); }
  }
  return out;
}

// 무제한 반복: 현재 기준 일정 기간 앞까지만 미리 생성 (월/년 24개월, 일/주 3개월)
function horizonStr(freq) {
  const now = new Date();
  let h = 24;
  if (freq === "daily" || freq === "weekdays") h = 3;
  else if (freq === "weekly" || freq === "biweekly" || freq === "every4weeks") h = 6;
  else if (freq === "yearly") h = 60;
  return ymd(new Date(now.getFullYear(), now.getMonth() + h, now.getDate()));
}
function genUnlimited(startStr, freq) {
  const horizon = horizonStr(freq);
  const out = genDates(startStr, freq, 366).filter(d => d <= horizon);
  return out.length ? out : [startStr];
}
// 앱 켤 때 무제한 반복 시리즈를 horizon까지 채워 넣음
function topUpUnlimited() {
  let changed = false;
  Object.keys(rules).forEach(g => {
    const r = rules[g];
    if (!r || r.kind !== "recur" || !r.unlimited) return;
    const gtx = txs.filter(t => t.group === g);
    if (!gtx.length) return;
    const tmpl = gtx.reduce((a, b) => a.date > b.date ? a : b);
    const startStr = gtx.reduce((m, t) => t.date < m ? t.date : m, gtx[0].date);
    const horizon = horizonStr(r.freq), have = new Set(gtx.map(t => t.date));
    genDates(startStr, r.freq, 366).forEach(d => {
      if (d > tmpl.date && d <= horizon && !have.has(d)) {
        const { amount, type, categoryId, memo, method, transfer, targetAssetId } = tmpl;
        txs.push({ id: uid("t_"), amount, type, categoryId, memo, date: d, method, group: g, ...(transfer ? { transfer:true, targetAssetId } : {}) });
        changed = true;
      }
    });
  });
  if (changed) saveLS(LS.txs, txs);
}

      <div class="icon" style="background:${dot}22">${c ? c.emoji : "❓"}</div>

function donutHTML(slices) {
  const total = slices.reduce((s,x)=>s+x.total,0);
  if (total <= 0) return `<div class="empty">표시할 데이터가 없어요</div>`;
  let off = 25;
  const circles = slices.map(s => {
    const pct = s.total/total*100; const col = s.cat ? s.cat.color : "#9aa0a6";
    const seg = `<circle r="15.915" cx="21" cy="21" fill="transparent" stroke="${col}" stroke-width="9"
      stroke-dasharray="${pct.toFixed(2)} ${(100-pct).toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"></circle>`;
    off = (off - pct + 100) % 100; return seg;
  }).join("");
  const legend = slices.map(s => { const col = s.cat ? s.cat.color : "#9aa0a6"; const name = s.cat ? esc(s.cat.name) : "미분류";
    return `<div class="legend-row"><span class="legend-dot" style="background:${col}"></span>
      <span class="lname">${name}</span><span class="lpct">${(s.total/total*100).toFixed(0)}%</span><span class="lamt">${won(s.total)}</span></div>`;
  }).join("");
  return `<div class="donut-wrap"><svg viewBox="0 0 42 42" width="140" height="140" style="transform:rotate(-90deg)">${circles}</svg><div class="legend">${legend}</div></div>`;
}

function trendChart(trend, barW) {
  const max = Math.max(1, ...trend.flatMap(t => [t.income, t.expense]));
  const bars = trend.map(t => `<div class="bar-col"><div class="bar-pair">
        <div class="bar" style="width:${barW}px;height:${t.income/max*90}px;background:var(--income)"></div>
        <div class="bar" style="width:${barW}px;height:${t.expense/max*90}px;background:var(--expense)"></div>
      </div><div class="bar-label">${t.label}</div></div>`).join("");
  return `<div class="card"><div class="bar-legend">
      <span><span class="legend-dot" style="background:var(--income);display:inline-block;margin-right:4px"></span>수입</span>
      <span><span class="legend-dot" style="background:var(--expense);display:inline-block;margin-right:4px"></span>지출</span>
    </div><div class="bars">${bars}</div></div>`;
}

function renderAssetDetail(id) {
  const a = assetById(id);
  if (!a) { state.assetDetail = null; return renderAssets(); }
  const entries = [];
  txs.forEach(t => {
    if (isPlanned(t)) return;
    if (t.assetEntry) { if (t.assetId === id) entries.push({ date:t.date, label:((t.dir||1)>0?"입금":"출금")+(t.memo?" · "+t.memo:""), delta:(t.dir||1)*t.amount, id:t.id, kind:"ae" }); return; }
    if (t.transfer) {
      if (t.targetAssetId === id) entries.push({ date:t.date, label:"현금에서 이체"+(t.memo?" · "+t.memo:""), delta:+t.amount, id:t.id, kind:"tx" });
      else if (a.cash) entries.push({ date:t.date, label:"저축 → "+assetName(t.targetAssetId)+(t.memo?" · "+t.memo:""), delta:-t.amount, id:t.id, kind:"tx" });
      return;
    }
    if (a.cash) {
      if (t.type === "income") entries.push({ date:t.date, label:(catById(t.categoryId)?.name||"수입")+(t.memo?" · "+t.memo:""), delta:+t.amount, id:t.id, kind:"tx" });
      else if (t.type === "expense") entries.push({ date:t.date, label:(catById(t.categoryId)?.name||"지출")+(t.memo?" · "+t.memo:""), delta:-t.amount, id:t.id, kind:"tx" });
    }
  });
  entries.sort((x,y) => x.date.localeCompare(y.date) || x.id.localeCompare(y.id));
  let run = 0; entries.forEach(e => { run += e.delta; e.bal = run; });
  const bal = run;
  entries.reverse();
  const rowsHtml = entries.map(e => {
    const md = e.date.slice(5).replace("-","/");
    const col = e.delta >= 0 ? "var(--income)" : "var(--expense)";
    const attr = e.kind === "ae" ? `data-aedel="${e.id}"` : `data-edit="${e.id}"`;
    return `<div class="ledger-row" ${attr}>
        <span class="ld">${md}</span><span class="ll">${esc(e.label)}</span>
        <span class="lv" style="color:${col}">${e.delta>=0?'+':'-'}${won(Math.abs(e.delta))}</span>
        <span class="lb">${won(e.bal)}</span></div>`;
  }).join("");
  view.innerHTML = `
    <div class="view-head"><button class="icon-btn" id="asset-back">←</button><button class="add-btn" id="asset-add-entry">＋</button></div>
    <div class="card asset-total">
      <div class="lbl">${a.emoji} ${esc(a.name)}${a.cash?" (현금)":""}</div>
      <div class="val">${won(bal)}</div>
      <button class="link-btn" id="asset-edit" style="margin-top:12px">이름·아이콘 수정</button>
    </div>
    <div class="section-title">변동 내역 ${entries.length?`(${entries.length})`:""}</div>
    <div class="card" style="padding:6px 14px">${rowsHtml || `<div class="empty">아직 변동 내역이 없어요<br>오른쪽 위 ＋ 로 추가해보세요</div>`}</div>`;
}

view.addEventListener("click", (e) => {
  const mn = e.target.closest("[data-mnav]"); if (mn) { shiftMonth(+mn.dataset.mnav); return; }
  if (e.target.id === "m-label") { openMonthWheel(state.month.getFullYear(), state.month.getMonth()+1, (y,m) => { state.month = new Date(y, m-1, 1); state.selectedDate = (monthKey(state.month)===todayStr.slice(0,7))?todayStr:ymd(state.month); render(); }); return; }
  if (e.target.id === "home-search") { openSearch(); return; }
  const dayEl = e.target.closest("[data-day]"); if (dayEl) { state.selectedDate = dayEl.dataset.day; renderHome(); return; }
  const editEl = e.target.closest("[data-edit]"); if (editEl) { openTxModal(editEl.dataset.edit); return; }
  const delEl = e.target.closest("[data-del]");
  if (delEl) { const id = delEl.dataset.del; const t = txs.find(x => x.id === id);
    if (t && t.group) openDelModal(t);
    else showConfirm("거래 삭제", "이 거래를 삭제할까요?", () => { txs = txs.filter(x => x.id !== id); saveLS(LS.txs,txs); render(); });
    return; }
  const dtb = e.target.closest("[data-dt]"); if (dtb) { state.donutType = dtb.dataset.dt; render(); return; }
  const sm = e.target.closest("[data-smode]"); if (sm) { state.stats.mode = sm.dataset.smode; render(); return; }
  const sn = e.target.closest("[data-snav]"); if (sn) { const dir = +sn.dataset.snav;
    if (state.stats.mode === "month") state.stats.month = new Date(state.stats.month.getFullYear(), state.stats.month.getMonth()+dir, 1); else state.stats.year += dir; render(); return; }
  if (e.target.id === "stats-period") {
    if (state.stats.mode === "month") openMonthWheel(state.stats.month.getFullYear(), state.stats.month.getMonth()+1, (y,m) => { state.stats.month = new Date(y, m-1, 1); render(); });
    else openMonthWheel(state.stats.year, 1, (y) => { state.stats.year = y; render(); });
    return;
  }
  const asEl = e.target.closest("[data-asset]"); if (asEl) { state.assetDetail = asEl.dataset.asset; render(); return; }
  const cvEl = e.target.closest("[data-catview]"); if (cvEl) { state.catView = cvEl.dataset.catview; render(); return; }
  const acEl = e.target.closest("[data-addcat]"); if (acEl) { openCatModal(acEl.dataset.addcat); return; }
  const dc = e.target.closest("[data-delcat]"); if (dc) { if (confirm("이 카테고리를 삭제할까요? 기존 거래는 '미분류'로 표시됩니다.")) { cats = cats.filter(c => c.id !== dc.dataset.delcat); saveLS(LS.cats,cats); render(); } return; }
  const ad = e.target.closest("[data-aedel]"); if (ad) { if (confirm("이 입력 항목을 삭제할까요?")) { txs = txs.filter(x => x.id !== ad.dataset.aedel); saveLS(LS.txs,txs); render(); } return; }

  if (e.target.id === "cat-back") { state.catView = null; render(); }
  if (e.target.id === "asset-back") { state.assetDetail = null; render(); }
  if (e.target.id === "asset-edit") { openAssetModal(state.assetDetail); }
  if (e.target.id === "asset-add-entry") { openAEntry(state.assetDetail); }
  if (e.target.id === "add-asset") openAssetModal(null);
  if (e.target.id === "th-light") { setTheme("light"); render(); }
  if (e.target.id === "th-dark") { setTheme("dark"); render(); }
  if (e.target.id === "cloud-login") cloudLogin();
  if (e.target.id === "cloud-register") cloudRegister();
  if (e.target.id === "cloud-logout") cloudLogout();
  if (e.target.id === "export-csv") exportCsv();
  if (e.target.id === "reset-data") {
    if (confirm("정말 모든 데이터를 지울까요? 거래·자산 내역이 전부 삭제되고 금액이 0이 됩니다. 되돌릴 수 없습니다.")) {
      Object.values(LS).forEach(k => localStorage.removeItem(k));
      localStorage.setItem(LS.seeded, "1"); // 샘플 데이터 재생성 방지 → 완전히 빈 상태
      location.reload();
    }
  }
});

function setTheme(t) { document.documentElement.setAttribute("data-theme", t); saveLS(LS.theme, t); }
setTheme(loadLS(LS.theme, "light"));

// ---------- 거래 모달 ----------
const txModal = document.getElementById("tx-modal");
const $ = (id) => document.getElementById(id);
const methodModal = document.getElementById("method-modal");
const repeatModal = document.getElementById("repeat-modal");
const targetModal = document.getElementById("target-modal");
$("fab").addEventListener("click", () => openTxModal(null));
$("f-close").addEventListener("click", () => txModal.classList.remove("open"));
$("t-expense").addEventListener("click", () => { state.form.type="expense"; state.form.categoryId=null; state.form.targetAssetId=null; renderTxForm(); if (!$("f-amount").value) $("f-amount").focus(); });
$("t-income").addEventListener("click", () => { state.form.type="income"; state.form.categoryId=null; state.form.targetAssetId=null; renderTxForm(); if (!$("f-amount").value) $("f-amount").focus(); });
$("f-amount").addEventListener("input", () => { if (methodModal.classList.contains("open")) renderMethodModal(); });
$("f-exclude").addEventListener("change", () => { state.form.exclude = $("f-exclude").checked; });
$("f-save").addEventListener("click", saveTx);
// 3버튼 → 팝업
$("btn-method").addEventListener("click", () => { const cat = catById(state.form.categoryId); if (!(state.form.type === "expense" && !(cat && cat.transfer))) return; renderMethodModal(); methodModal.classList.add("open"); });
$("btn-repeat").addEventListener("click", () => { if (state.form.isInstall) return; renderRepeatModal(); repeatModal.classList.add("open"); });
// 결제수단 팝업
$("m-cash").addEventListener("click", () => { state.form.method = "cash"; renderMethodModal(); });
$("m-card").addEventListener("click", () => { state.form.method = "card"; renderMethodModal(); });
$("f-install").addEventListener("change", renderMethodModal);
$("mm-close").addEventListener("click", () => methodModal.classList.remove("open"));
$("mm-done").addEventListener("click", () => { methodModal.classList.remove("open"); updateTxCond(); });
// 반복 팝업
$("f-unlimited").addEventListener("change", () => { state.form.unlimited = $("f-unlimited").checked; renderRepeatModal(); });
$("rm-close").addEventListener("click", () => repeatModal.classList.remove("open"));
$("rm-done").addEventListener("click", () => { repeatModal.classList.remove("open"); updateTxCond(); });
// 이체 대상 팝업
$("open-target").addEventListener("click", openTargetModal);
$("tm-close").addEventListener("click", () => targetModal.classList.remove("open"));

function openTxModal(id) {
  $("f-install").value = "1"; $("f-count").value = "12";
  if (id) {
    const t = txs.find(x => x.id === id);
    const grp = t.group ? rules[t.group] : null;
    const editRecur = !!(grp && grp.kind === "recur");
    const isInstall = !!(grp && grp.kind === "installment");
    state.form = { id, type:t.type, categoryId:t.categoryId, method:t.method||"cash", targetAssetId:t.targetAssetId||null,
      exclude: !!t.exclude, repeat:"none", unlimited:true, date:t.date, editRecur, isInstall, recurCountPrefill:0 };
    $("tx-modal-title").textContent = "거래 수정";
    $("f-amount").value = t.amount; $("f-memo").value = t.memo || ""; $("f-exclude").checked = !!t.exclude;
    $("f-date").value = t.date; $("date-field").style.display = "block";
    $("f-save").style.display = "block"; $("f-save").textContent = "수정 완료";
    if (editRecur) {
      const tail = txs.filter(x => x.group === t.group && x.date >= t.date).length;
      state.form.repeat = grp.freq; state.form.unlimited = !!grp.unlimited; state.form.recurCountPrefill = tail;
      $("f-count").value = tail;
    }
  } else {
    state.form = { id:null, type:"expense", categoryId:null, method:"cash", targetAssetId:null,
      exclude:false, repeat:"none", unlimited:true, date: state.selectedDate || todayStr, editRecur:false, isInstall:false, recurCountPrefill:0 };
    $("tx-modal-title").textContent = "거래 입력";
    $("f-amount").value = ""; $("f-memo").value = ""; $("f-exclude").checked = false; $("f-save").style.display = "none";
    $("date-field").style.display = "none";
  }
  $("f-unlimited").checked = state.form.unlimited;
  renderTxForm(); txModal.classList.add("open");
  if (!id) $("f-amount").focus(); // 입력은 바로 금액 입력 가능하게
}

function pickCategory(id) {
  state.form.categoryId = id; renderTxForm();
  const cat = catById(id);
  const isTransfer = state.form.type === "expense" && cat && cat.transfer;
  if (isTransfer) { openTargetModal(); return; }   // 저축 → 대상 팝업
  if (!state.form.id) saveTx();                      // 입력 모드: 카테고리 선택 즉시 저장
}
function pickTarget(id) {
  state.form.targetAssetId = id;
  targetModal.classList.remove("open");
  if (!state.form.id) saveTx(); else renderTxForm();
}
function openTargetModal() { renderTargetModal(); targetModal.classList.add("open"); }
function renderTargetModal() {
  const tbox = $("f-targets");
  tbox.innerHTML = assets.filter(a => !a.cash).map(a => {
    const sel = a.id === state.form.targetAssetId;
    return `<button class="cat-item ${sel?'sel':''}" data-target="${a.id}">
      <span class="cat-circle" style="background:var(--savings)">${a.emoji}</span>
      <span class="cat-name">${esc(a.name)}</span></button>`;
  }).join("");
  tbox.querySelectorAll("[data-target]").forEach(b => b.addEventListener("click", () => pickTarget(b.dataset.target)));
}

function renderTxForm() {
  const exp = state.form.type === "expense";
  $("t-expense").className = exp ? "act-exp" : ""; $("t-income").className = exp ? "" : "act-inc";
  const box = $("f-cats");
  box.innerHTML = cats.filter(c => c.type === state.form.type).map(c => {
    const sel = c.id === state.form.categoryId;
    let emoji = c.emoji, name = c.name;
    // 저축(이체) 카테고리가 선택되고 대상이 정해지면 → 그 자산 이름·아이콘으로 표시
    if (c.transfer && sel && state.form.targetAssetId) { const ta = assetById(state.form.targetAssetId); if (ta) { emoji = ta.emoji; name = ta.name; } }
    return `<button class="cat-item ${sel?'sel':''}" data-pick="${c.id}">
      <span class="cat-circle" style="background:${c.color}">${emoji}</span>
      <span class="cat-name">${esc(name)}</span></button>`;
  }).join("");
  box.querySelectorAll("[data-pick]").forEach(b => b.addEventListener("click", () => pickCategory(b.dataset.pick)));
  updateTxCond();
}

function updateTxCond() {
  const exp = state.form.type === "expense", editing = !!state.form.id;
  const cat = catById(state.form.categoryId);
  const isTransfer = exp && cat && cat.transfer;
  const methodAvail = exp && !isTransfer;
  $("target-info").style.display = "none"; // 대상은 저축 카테고리 칸 자체에 표시
  $("cat-hint").textContent = editing ? "" : "(선택하면 저장)";
  const install = parseInt($("f-install").value) || 1;
  $("method-val").textContent = !methodAvail ? "현금" : (state.form.method === "card" ? (install > 1 ? `카드 ${install}개월` : "카드") : "현금");
  const rep = state.form.repeat;
  const repT = (REPEATS.find(x => x.v === rep) || {}).t || "안 함";
  $("repeat-val").textContent = rep === "none" ? "안 함" : (repT + (state.form.unlimited ? "" : "·" + (parseInt($("f-count").value) || 1) + "회"));
  $("btn-method").style.opacity = methodAvail ? "1" : ".5";
  $("btn-repeat").style.opacity = state.form.isInstall ? ".5" : "1";
}

function renderMethodModal() {
  $("m-cash").className = state.form.method === "cash" ? "on" : "";
  $("m-card").className = state.form.method === "card" ? "on" : "";
  const showInstall = state.form.method === "card" && !state.form.id;
  $("install-wrap").style.display = showInstall ? "block" : "none";
  const install = parseInt($("f-install").value) || 1;
  if (showInstall && install > 1) { const amt = parseFloat($("f-amount").value) || 0;
    $("install-hint").textContent = amt > 0 ? `다음 달부터 ${install}개월간 매달 약 ${won(Math.floor(amt/install))}씩 자동 입력` : `다음 달부터 ${install}개월간 N등분 자동 입력`;
  } else $("install-hint").textContent = "";
}

function renderRepeatModal() {
  const box = $("repeat-list");
  box.innerHTML = REPEATS.map(r => `<button class="list-opt ${state.form.repeat===r.v?'sel':''}" data-rep="${r.v}">${r.t}</button>`).join("");
  box.querySelectorAll("[data-rep]").forEach(b => b.addEventListener("click", () => { state.form.repeat = b.dataset.rep; renderRepeatModal(); }));
  const rep = state.form.repeat;
  $("unlimited-row").style.display = rep === "none" ? "none" : "flex";
  $("count-wrap").style.display = (rep !== "none" && !state.form.unlimited) ? "block" : "none";
  $("count-label").textContent = (state.form.id && state.form.editRecur) ? "이 시점부터 반복 횟수" : "반복 횟수";
}

function saveTx() {
  const amount = parseFloat($("f-amount").value);
  if (!amount || amount <= 0) { alert("금액을 올바르게 입력하세요"); return; }
  if (!state.form.categoryId) { alert("카테고리를 선택하세요"); return; }
  const type = state.form.type, categoryId = state.form.categoryId;
  const memo = $("f-memo").value.trim();
  const date = state.form.id ? ($("f-date").value || state.form.date || todayStr) : (state.form.date || todayStr);
  const cat = catById(categoryId);
  const isTransfer = type === "expense" && cat && cat.transfer;
  if (isTransfer && !state.form.targetAssetId) { alert("이체 대상 자산을 선택하세요"); return; }
  const method = (type === "expense" && !isTransfer) ? state.form.method : "cash";
  const exclude = !!state.form.exclude;
  const extra = {};
  if (isTransfer) { extra.transfer = true; extra.targetAssetId = state.form.targetAssetId; }
  if (exclude) extra.exclude = true;
  const monthOf = (ds) => new Date(parseYMD(ds).getFullYear(), parseYMD(ds).getMonth(), 1);

  if (state.form.id) {
    const orig = txs.find(t => t.id === state.form.id);
    const newVals = { amount, type, categoryId, memo, method, transfer: isTransfer || undefined, targetAssetId: isTransfer ? state.form.targetAssetId : undefined, exclude: exclude || undefined };
    if (orig && orig.group) {
      const rule = rules[orig.group] || {};
      const recur = state.form.editRecur
        ? { freq: state.form.repeat, count: Math.max(1, parseInt($("f-count").value)||1), unlimited: $("f-unlimited").checked }
        : null;
      state.pendingEdit = { id: orig.id, group: orig.group, origDate: orig.date, date, recur, ...newVals };
      const repChanged = state.form.editRecur && (
        state.form.repeat !== rule.freq ||
        $("f-unlimited").checked !== !!rule.unlimited ||
        (!$("f-unlimited").checked && (parseInt($("f-count").value)||1) !== state.form.recurCountPrefill)
      );
      txModal.classList.remove("open");
      if (repChanged) { applyEdit("after-rule"); return; }
      openEditModal(orig);
      return;
    }
    // 단건 수정: 반복을 새로 걸면 시리즈로 전환
    const rep0 = state.form.repeat;
    if (rep0 !== "none") {
      txs = txs.filter(t => t.id !== state.form.id);
      const group = uid("g_"), unlimited = $("f-unlimited").checked, count = Math.max(1, parseInt($("f-count").value)||1);
      const dates = unlimited ? genUnlimited(date, rep0) : genDates(date, rep0, count);
      dates.forEach(dstr => txs.push({ id: uid("t_"), amount, type, categoryId, memo, date: dstr, method, group, ...extra }));
      rules[group] = { kind:"recur", freq:rep0, count: unlimited?null:count, unlimited: unlimited||undefined, type, categoryId };
    } else {
      txs = txs.map(t => t.id === state.form.id ? { ...t, ...newVals, date } : t);
    }
    saveLS(LS.txs, txs); saveLS(LS.rules, rules);
    state.selectedDate = date; state.month = monthOf(date);
    txModal.classList.remove("open"); render();
    return;
  } else if (type === "expense" && !isTransfer && method === "card" && (parseInt($("f-install").value)||1) > 1) {
    const N = parseInt($("f-install").value), group = uid("g_"), base = Math.floor(amount/N), rem = amount - base*N;
    const start = parseYMD(date), baseAbs = start.getFullYear()*12 + start.getMonth();
    for (let k=1; k<=N; k++) { const abs = baseAbs + k, yy = Math.floor(abs/12), mm = abs%12, day = Math.min(start.getDate(), lastDay(yy, mm));
      txs.push({ id: uid("t_"), amount: base + (k===1?rem:0), type:"expense", categoryId, memo: (memo?memo+" ":"")+`(할부 ${k}/${N})`, date: ymd(new Date(yy, mm, day)), method:"card", group, ...(exclude?{exclude:true}:{}) }); }
    rules[group] = { kind:"installment", months:N, categoryId };
  } else {
    const rep = state.form.repeat;
    if (rep === "none") {
      txs.push({ id: uid("t_"), amount, type, categoryId, memo, date, method, ...extra });
    } else {
      const group = uid("g_"), unlimited = $("f-unlimited").checked, count = Math.max(1, parseInt($("f-count").value)||1);
      const dates = unlimited ? genUnlimited(date, rep) : genDates(date, rep, count);
      dates.forEach(dstr => txs.push({ id: uid("t_"), amount, type, categoryId, memo, date: dstr, method, group, ...extra }));
      rules[group] = { kind:"recur", freq:rep, count: unlimited?null:count, unlimited: unlimited||undefined, type, categoryId };
    }
  }
  saveLS(LS.txs, txs); saveLS(LS.rules, rules);
  state.selectedDate = date; state.month = monthOf(date);
  txModal.classList.remove("open"); render();
}

// ---------- 반복 삭제 모달 ----------
const delModal = document.getElementById("del-modal");
$("del-cancel").addEventListener("click", () => delModal.classList.remove("open"));
delModal.addEventListener("click", (e) => {
  if (e.target === delModal) { delModal.classList.remove("open"); return; }
  const opt = e.target.closest("[data-delmode]"); if (!opt) return;
  doDelete(opt.dataset.delmode); delModal.classList.remove("open");
});
function openDelModal(t) {
  state.delTarget = t.id;
  const g = t.group, after = txs.filter(x => x.group === g && x.date >= t.date).length, all = txs.filter(x => x.group === g).length;
  const kind = rules[g]?.kind === "installment" ? "할부" : "반복";
  $("del-desc").textContent = `이 거래는 ${kind}로 만들어졌어요. (전체 ${all}건 중 이날 이후 ${after}건)`;
  delModal.classList.add("open");
}
function doDelete(mode) {
  const t = txs.find(x => x.id === state.delTarget); if (!t) return;
  const g = t.group;
  if (mode === "one") txs = txs.filter(x => x.id !== t.id);
  else if (mode === "after") txs = txs.filter(x => !(x.group === g && x.date >= t.date));
  else if (mode === "after-rule") { txs = txs.filter(x => !(x.group === g && x.date >= t.date)); if (g) delete rules[g]; }
  else if (mode === "all") { txs = txs.filter(x => x.group !== g); if (g) delete rules[g]; }
  saveLS(LS.txs, txs); saveLS(LS.rules, rules); render();
}

// ---------- 확인(삭제) 팝업 ----------
const confirmModal = document.getElementById("confirm-modal");
let _confirmCb = null;
function showConfirm(title, msg, onOk) {
  $("confirm-title").textContent = title; $("confirm-msg").textContent = msg;
  _confirmCb = onOk; confirmModal.classList.add("open");
}
function closeConfirm() { confirmModal.classList.remove("open"); _confirmCb = null; }
$("confirm-x").addEventListener("click", closeConfirm);
$("confirm-ok").addEventListener("click", () => { const cb = _confirmCb; closeConfirm(); if (cb) cb(); });

// ---------- 반복 수정 범위 모달 ----------
const editModal = document.getElementById("edit-modal");
$("edit-cancel").addEventListener("click", () => editModal.classList.remove("open"));
editModal.addEventListener("click", (e) => {
  if (e.target === editModal) { editModal.classList.remove("open"); return; }
  const opt = e.target.closest("[data-editmode]"); if (!opt) return;
  applyEdit(opt.dataset.editmode); editModal.classList.remove("open");
});
function openEditModal(t) {
  const g = t.group, after = txs.filter(x => x.group === g && x.date >= t.date).length;
  const kind = rules[g]?.kind === "installment" ? "할부" : "반복";
  $("edit-desc").textContent = `이 거래는 ${kind}로 만들어졌어요. 금액·날짜 변경을 어디까지 적용할까요? (이날 이후 ${after}건)`;
  editModal.classList.add("open");
}
function applyEdit(mode) {
  const pe = state.pendingEdit; if (!pe) return;
  const g = pe.group;
  const vals = { amount:pe.amount, type:pe.type, categoryId:pe.categoryId, memo:pe.memo, method:pe.method, transfer:pe.transfer, targetAssetId:pe.targetAssetId, exclude:pe.exclude };
  if (mode === "one") {
    txs = txs.map(t => t.id === pe.id ? { ...t, ...vals, date: pe.date } : t);
  } else if (mode === "after-rule" && pe.recur) {
    // 반복 설정 변경 → 이 시점부터 새 횟수/주기로 재생성 (이전 회차는 유지)
    const before = txs.filter(t => t.group === g && t.date < pe.origDate).length;
    txs = txs.filter(t => !(t.group === g && t.date >= pe.origDate));
    const dates = pe.recur.unlimited
      ? genUnlimited(pe.date, pe.recur.freq)
      : genDates(pe.date, pe.recur.freq, pe.recur.count);
    dates.forEach(d => txs.push({ id: uid("t_"), date: d, group: g, ...vals }));
    rules[g] = { kind:"recur", freq:pe.recur.freq, count: pe.recur.unlimited ? null : (before + pe.recur.count), unlimited: pe.recur.unlimited||undefined, type:pe.type, categoryId:pe.categoryId };
    saveLS(LS.rules, rules);
  } else {
    // 이날 이후 값·날짜만 변경 (횟수 유지)
    const rule = rules[g];
    let freq = "monthly";
    if (rule && rule.kind === "recur") { freq = rule.freq; }
    const count = txs.filter(t => t.group === g && t.date >= pe.origDate).length;
    txs = txs.filter(t => !(t.group === g && t.date >= pe.origDate));
    genDates(pe.date, freq, count).forEach(d => txs.push({ id: uid("t_"), date: d, group: g, ...vals }));
  }
  saveLS(LS.txs, txs);
  state.selectedDate = pe.date; state.month = new Date(parseYMD(pe.date).getFullYear(), parseYMD(pe.date).getMonth(), 1);
  state.pendingEdit = null; render();
}

// ---------- 카테고리 모달 ----------
const catModal = document.getElementById("cat-modal");
$("c-cancel").addEventListener("click", () => catModal.classList.remove("open"));
$("c-expense").addEventListener("click", () => { state.catForm.type="expense"; renderCatForm(); });
$("c-income").addEventListener("click", () => { state.catForm.type="income"; renderCatForm(); });
$("c-save").addEventListener("click", saveCat);
function openCatModal(type) {
  state.catForm = { type: type || "expense", emoji:EMOJIS[0], color:COLORS[0], transfer:false };
  $("cat-modal-title").textContent = (type === "income" ? "입금" : "지출") + " 카테고리 추가";
  $("c-name").value = ""; $("c-transfer").checked = false; renderCatForm(); catModal.classList.add("open");
}
function renderCatForm() {
  const exp = state.catForm.type === "expense";
  $("c-expense").className = exp ? "act-exp" : ""; $("c-income").className = exp ? "" : "act-inc";
  $("c-transfer-field").style.display = exp ? "block" : "none";
  const eb = $("c-emojis"); eb.innerHTML = EMOJIS.map(e => `<button class="e ${e===state.catForm.emoji?'sel':''}" data-e="${e}">${e}</button>`).join("");
  eb.querySelectorAll("[data-e]").forEach(b => b.addEventListener("click", () => { state.catForm.emoji=b.dataset.e; renderCatForm(); }));
  const cb = $("c-colors"); cb.innerHTML = COLORS.map(c => `<button class="c ${c===state.catForm.color?'sel':''}" data-c="${c}" style="background:${c}"></button>`).join("");
  cb.querySelectorAll("[data-c]").forEach(b => b.addEventListener("click", () => { state.catForm.color=b.dataset.c; renderCatForm(); }));
}
function saveCat() {
  const name = $("c-name").value.trim(); if (!name) { alert("이름을 입력하세요"); return; }
  const transfer = state.catForm.type === "expense" && $("c-transfer").checked;
  cats.push({ id: uid("c_"), name, emoji: state.catForm.emoji, color: state.catForm.color, type: state.catForm.type, ...(transfer?{transfer:true}:{}) });
  saveLS(LS.cats, cats); catModal.classList.remove("open"); render();
}

// ---------- 자산 모달 ----------
const assetModal = document.getElementById("asset-modal");
$("a-cancel").addEventListener("click", () => assetModal.classList.remove("open"));
$("a-save").addEventListener("click", saveAsset);
$("a-delete").addEventListener("click", deleteAsset);
function openAssetModal(id) {
  if (id) { const a = assetById(id); state.assetForm = { id, emoji:a.emoji };
    $("asset-modal-title").textContent = "자산 수정"; $("a-name").value = a.name;
    $("a-delete").style.display = a.cash ? "none" : "block";
  } else { state.assetForm = { id:null, emoji:EMOJIS[0] };
    $("asset-modal-title").textContent = "자산 항목 추가"; $("a-name").value = ""; $("a-delete").style.display = "none"; }
  renderAssetForm(); assetModal.classList.add("open");
}
function renderAssetForm() {
  const eb = $("a-emojis"); eb.innerHTML = EMOJIS.map(e => `<button class="e ${e===state.assetForm.emoji?'sel':''}" data-e="${e}">${e}</button>`).join("");
  eb.querySelectorAll("[data-e]").forEach(b => b.addEventListener("click", () => { state.assetForm.emoji=b.dataset.e; renderAssetForm(); }));
}
function saveAsset() {
  const name = $("a-name").value.trim(); if (!name) { alert("이름을 입력하세요"); return; }
  if (state.assetForm.id) assets = assets.map(a => a.id === state.assetForm.id ? { ...a, name, emoji:state.assetForm.emoji } : a);
  else assets.push({ id: uid("a_"), name, emoji:state.assetForm.emoji });
  saveLS(LS.assets, assets); assetModal.classList.remove("open"); render();
}
function deleteAsset() {
  if (!state.assetForm.id) return;
  if (confirm("이 자산 항목을 삭제할까요? (이 자산의 입력 내역도 함께 삭제됩니다)")) {
    txs = txs.filter(t => !(t.assetEntry && t.assetId === state.assetForm.id)); saveLS(LS.txs, txs);
    assets = assets.filter(a => a.id !== state.assetForm.id); saveLS(LS.assets, assets);
    assetModal.classList.remove("open"); if (state.assetDetail === state.assetForm.id) state.assetDetail = null; render();
  }
}

// ---------- 자산 입력(입금/출금) 모달 ----------
const aentryModal = document.getElementById("aentry-modal");
$("ae-cancel").addEventListener("click", () => aentryModal.classList.remove("open"));
$("ae-in").addEventListener("click", () => { state.aentry.dir = 1; renderAEntry(); });
$("ae-out").addEventListener("click", () => { state.aentry.dir = -1; renderAEntry(); });
$("ae-save").addEventListener("click", saveAEntry);
function openAEntry(assetId) {

  $("aentry-title").textContent = (assetById(assetId)?.name || "") + " 입력";
  $("ae-amount").value = ""; $("ae-memo").value = "";

}
function renderAEntry() {
  $("ae-in").className = state.aentry.dir > 0 ? "act-inc" : "";
  $("ae-out").className = state.aentry.dir < 0 ? "act-exp" : "";
}
function saveAEntry() {
  const amount = parseFloat($("ae-amount").value);
  if (!amount || amount <= 0) { alert("금액을 올바르게 입력하세요"); return; }

  saveLS(LS.txs, txs); aentryModal.classList.remove("open"); render();
}

// ---------- CSV ----------
function exportCsv() {
  const field = (v) => /[",\n]/.test(v) ? '"' + String(v).replace(/"/g,'""') + '"' : String(v);
  const rows = [["날짜","유형","카테고리","금액","결제","대상자산","메모"].join(",")];
  [...txs].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t => {
    const type = t.assetEntry ? ((t.dir||1)>0?"자산입금":"자산출금") : (t.transfer ? "이체" : (t.type==="income"?"수입":"지출"));
    const catName = t.assetEntry ? "" : (catById(t.categoryId)?.name || "미분류");
    const target = t.assetEntry ? assetName(t.assetId) : (t.transfer ? assetName(t.targetAssetId) : "");
    rows.push([ t.date, type, field(catName), Math.round(t.amount),
      t.method==="card"?"카드":"현금", field(target), field(t.memo||"") ].join(","));
  });
  const blob = new Blob(["﻿" + rows.join("\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "가계부.csv"; a.click(); URL.revokeObjectURL(a.href);
}

// ---------- 휠 날짜 선택 ----------
const wheelModal = document.getElementById("wheel-modal");
let _wheelApply = null;
function setSel(el, i) { const n = el.children.length; i = Math.max(0, Math.min(n-1, i)); el._sel = i; [...el.children].forEach((x,j) => x.classList.toggle("on", j===i)); }
function buildWheel(el, values, selIdx) {
  el.innerHTML = values.map(v => `<div class="wheel-item">${v}</div>`).join("");
  [...el.children].forEach((it,i) => it.addEventListener("click", () => { el.scrollTo({ top: i*40, behavior: "smooth" }); setSel(el, i); }));
  requestAnimationFrame(() => { el.scrollTop = selIdx*40; setSel(el, selIdx); });
  el.onscroll = () => { clearTimeout(el._t); el._t = setTimeout(() => setSel(el, Math.round(el.scrollTop/40)), 90); };
}
function openMonthWheel(year, month, onApply) {
  _wheelApply = onApply;
  const years = []; for (let y=2015; y<=2035; y++) years.push(y+"년");
  const months = []; for (let m=1; m<=12; m++) months.push(m+"월");
  wheelModal.classList.add("open");
  buildWheel($("wheel-year"), years, Math.max(0, Math.min(20, year-2015)));
  buildWheel($("wheel-month"), months, Math.max(0, Math.min(11, month-1)));
}
$("wheel-x").addEventListener("click", () => wheelModal.classList.remove("open"));
$("wheel-ok").addEventListener("click", () => {
  const y = 2015 + ($("wheel-year")._sel || 0);
  const m = 1 + ($("wheel-month")._sel || 0);
  wheelModal.classList.remove("open");
  if (_wheelApply) _wheelApply(y, m);
});

// ---------- 검색 ----------
const searchModal = document.getElementById("search-modal");
function openSearch() {
  state.search = { period:"all", type:"all", method:"all", sort:"date", results:null };
  $("search-q").value = ""; $("search-q").dispatchEvent(new Event("input"));
  $("search-range").style.display = "none"; $("search-results").innerHTML = "";
  updateSearchChips(); searchModal.classList.add("open");
}
function updateSearchChips() {
  $("search-period").querySelectorAll("[data-sp]").forEach(b => b.classList.toggle("active", b.dataset.sp===state.search.period));
  $("search-type").querySelectorAll("[data-st]").forEach(b => b.classList.toggle("active", b.dataset.st===state.search.type));
  $("search-method").querySelectorAll("[data-sm]").forEach(b => b.classList.toggle("active", b.dataset.sm===state.search.method));
}
function doSearch() {
  const q = $("search-q").value.trim().toLowerCase();
  let list = txs.filter(t => !t.assetEntry);
  if (state.search.type === "income") list = list.filter(t => t.type === "income" && !t.transfer);
  else if (state.search.type === "expense") list = list.filter(t => t.type === "expense" && !t.transfer);
  if (state.search.method !== "all") list = list.filter(t => (t.method||"cash") === state.search.method);
  const p = state.search.period;
  if (p === "month") { const k = todayStr.slice(0,7); list = list.filter(t => t.date.startsWith(k)); }
  else if (p === "week") { const now = new Date(); const st = new Date(now); st.setDate(now.getDate()-now.getDay()); const s = ymd(st); list = list.filter(t => t.date>=s && t.date<=todayStr); }
  else if (p === "custom") { const f = $("search-from").value, to = $("search-to").value; if (f) list = list.filter(t => t.date>=f); if (to) list = list.filter(t => t.date<=to); }
  if (q) list = list.filter(t =>
    (t.memo||"").toLowerCase().includes(q) ||
    (catById(t.categoryId)?.name||"").toLowerCase().includes(q) ||
    (t.transfer && assetName(t.targetAssetId).toLowerCase().includes(q)));
  list.sort((a,b) => state.search.sort === "amount" ? (b.amount-a.amount) : b.date.localeCompare(a.date));
  state.search.results = list; renderSearchResults();
}
function renderSearchResults() {
  const list = state.search.results || [];
  const inc = list.filter(t=>t.type==="income" && !t.transfer).reduce((s,t)=>s+t.amount,0);
  const exp = list.filter(t=>t.type==="expense" && !t.transfer).reduce((s,t)=>s+t.amount,0);
  const sav = list.filter(t=>t.transfer).reduce((s,t)=>s+t.amount,0);
  $("search-results").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px">
      <span style="font-size:13px;color:var(--text-dim)">총 ${list.length}건</span>
      <span style="display:flex;gap:6px"><button class="chip ${state.search.sort==='amount'?'active':''}" data-ss="amount">금액순</button><button class="chip ${state.search.sort==='date'?'active':''}" data-ss="date">날짜순</button></span>
    </div>
    <div style="display:flex;justify-content:space-around;padding:10px 0;font-size:13px">
      <span style="color:var(--income)">수입 ${won(inc)}</span><span style="color:var(--expense)">지출 ${won(exp)}</span><span style="color:var(--savings)">저축 ${won(sav)}</span>
    </div>
    ${list.length ? `<div class="card" style="padding:6px 14px;margin:0">${list.map(t=>txRow(t)).join("")}</div>` : `<div class="empty">검색 결과가 없습니다.</div>`}`;
}
$("search-x").addEventListener("click", () => searchModal.classList.remove("open"));
$("search-go").addEventListener("click", doSearch);
searchModal.addEventListener("click", (e) => {
  if (e.target === searchModal) { searchModal.classList.remove("open"); return; }
  const sp = e.target.closest("[data-sp]"); if (sp) { state.search.period = sp.dataset.sp; updateSearchChips(); $("search-range").style.display = sp.dataset.sp==="custom"?"flex":"none"; return; }
  const st = e.target.closest("[data-st]"); if (st) { state.search.type = st.dataset.st; updateSearchChips(); return; }
  const sm = e.target.closest("[data-sm]"); if (sm) { state.search.method = sm.dataset.sm; updateSearchChips(); return; }
  const ss = e.target.closest("[data-ss]"); if (ss) { state.search.sort = ss.dataset.ss; doSearch(); return; }
  const ed = e.target.closest("[data-edit]"); if (ed) { searchModal.classList.remove("open"); openTxModal(ed.dataset.edit); return; }
});

// ---------- 입력칸 지우기(X) ----------
document.querySelectorAll("input.clearable").forEach(inp => {
  const wrap = document.createElement("div"); wrap.className = "input-wrap";
  inp.parentNode.insertBefore(wrap, inp); wrap.appendChild(inp);
  const x = document.createElement("button"); x.type = "button"; x.className = "clear-x"; x.textContent = "✕"; wrap.appendChild(x);
  x.addEventListener("click", () => { inp.value = ""; inp.dispatchEvent(new Event("input")); inp.focus(); });
});

[txModal, methodModal, repeatModal, targetModal, catModal, assetModal, aentryModal, confirmModal, wheelModal, searchModal].forEach(m => m.addEventListener("click", e => { if (e.target === m) m.classList.remove("open"); }));

// ---------- Firebase 동기화 ----------
function schedulePush() {
  if (!cloud.user || cloud.applyingRemote) return;
  clearTimeout(_pushTimer); _pushTimer = setTimeout(pushCloud, 600);
}
function pushCloud() {
  if (!cloud.user || !fbDb) return;
  fbDb.collection("users").doc(cloud.user.uid).set({ txs, cats, assets, rules, theme: loadLS(LS.theme, "light"), updatedAt: Date.now() })
    .catch(e => console.warn("동기화 저장 실패", e));
}
function applyRemote(d) {
  cloud.applyingRemote = true;
  if (Array.isArray(d.txs)) { txs = d.txs; localStorage.setItem(LS.txs, JSON.stringify(txs)); }
  if (Array.isArray(d.cats)) { cats = d.cats; localStorage.setItem(LS.cats, JSON.stringify(cats)); }
  if (Array.isArray(d.assets)) { assets = d.assets; localStorage.setItem(LS.assets, JSON.stringify(assets)); }
  if (d.rules && typeof d.rules === "object") { rules = d.rules; localStorage.setItem(LS.rules, JSON.stringify(rules)); }
  if (d.theme === "light" || d.theme === "dark") setTheme(d.theme);
  cloud.applyingRemote = false;
  if (state.assetDetail && !assetById(state.assetDetail)) state.assetDetail = null;
  render();
}
async function onLogin(user) {
  cloud.user = user;
  const ref = fbDb.collection("users").doc(user.uid);
  try {
    const snap = await ref.get();
    if (snap.exists && Array.isArray(snap.data().txs)) applyRemote(snap.data()); // 클라우드 데이터 불러오기
    else await ref.set({ txs, cats, assets, rules, updatedAt: Date.now() });     // 이 기기 데이터 업로드
  } catch (e) { console.warn(e); }
  cloud.unsub = ref.onSnapshot(snap => {
    if (!snap.exists || snap.metadata.hasPendingWrites) return; // 내가 방금 쓴 건 무시
    applyRemote(snap.data());
  }, e => console.warn("동기화 구독 오류", e));
  render();
}
function onLogout() {
  if (cloud.unsub) { cloud.unsub(); cloud.unsub = null; }
  cloud.user = null; render();
}
function cloudLogin() {
  if (!fbAuth) { alert("동기화 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요."); return; }
  const email = ($("cloud-email")?.value || "").trim(), pw = $("cloud-pw")?.value || "";
  if (!email || !pw) { alert("이메일과 비밀번호를 입력하세요"); return; }
  fbAuth.signInWithEmailAndPassword(email, pw).catch(e => alert("로그인 실패: " + (e.code || e.message)));
}
function cloudRegister() {
  if (!fbAuth) { alert("동기화 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요."); return; }
  const email = ($("cloud-email")?.value || "").trim(), pw = $("cloud-pw")?.value || "";
  if (!email || pw.length < 6) { alert("이메일과 비밀번호(6자 이상)를 입력하세요"); return; }
  fbAuth.createUserWithEmailAndPassword(email, pw).catch(e => alert("가입 실패: " + (e.code || e.message)));
}
function cloudLogout() { if (confirm("로그아웃할까요? (이 기기의 데이터는 그대로 남아요)")) fbAuth.signOut(); }
function initCloud() {
  if (typeof firebase === "undefined") { console.warn("Firebase SDK 미로드"); return; }
  try {
    firebase.initializeApp(firebaseConfig);
    fbAuth = firebase.auth(); fbDb = firebase.firestore();
    cloud.ready = true;
    fbAuth.onAuthStateChanged(u => { if (u) onLogin(u); else onLogout(); });
  } catch (e) { console.warn("Firebase 초기화 실패", e); }
}

topUpUnlimited();
render();
initCloud();
